<!doctype html>
<html lang="en">
  <head>
    <style>
      pre {
        height: 300px;
        width: 520px;
        margin: 20px;
        padding: 20px;
        display: inline-block;
        background-color: rgba(255, 0, 128, 0.9);
        border-width: 15px;
        box-sizing: border-box;
        border-radius: 50px;
      }

      /* border-style example classes */

      .b3 {
        border-style: dotted;

        border-block-start-color: rgba(255, 255, 255, 0.4);
        border-right-color: rgba(255, 255, 255, 0.9);
        border-block-end-color: rgba(255, 255, 255, 0.5);
        border-left-color: rgba(255, 255, 255, 0.9);
      }

      .b4 {
        border-style: dashed;

        border-block-start-color: rgba(255, 255, 255, 1);
        border-right-color: rgba(255, 255, 255, 1);
        border-block-end-color: rgba(255, 255, 255, 1);
        border-left-color: rgba(255, 255, 255, 1);
      }

      .b5 {
        border-style: solid;

        border-block-start-color: rgba(255, 255, 255, 0.4);
        border-right-color: rgba(255, 255, 255, 0.5);
        border-block-end-color: rgba(255, 255, 255, 0.5);
        border-left-color: rgba(255, 255, 255, 0.9);
      }

      .b6 {
        border-style: double;

        border-block-start-color: rgba(255, 255, 255, 0.4);

        border-right-color: rgba(255, 255, 255, 0.9);

        border-block-end-color: rgba(255, 255, 255, 0.5);
        border-left-color: rgba(255, 255, 255, 0.9);
      }

      .b7 {
        border-style: groove ridge ridge groove;

        border-block-start-color: rgba(255, 255, 255, 0.4);

        border-inline-start-color: rgba(255, 0, 128, 1);

        /* BOTTOM */
        border-block-end-color: rgba(255, 255, 255, 0.5);

        /* LEFT */
        border-left-color: rgba(255, 255, 255, 0.9);
      }

      .b8 {
        border-style: ridge groove groove ridge;

        border-block-start-color: rgba(255, 255, 255, 0.7);
        border-right-color: rgba(255, 255, 255, 0.7);
        border-block-end-color: rgba(255, 255, 255, 0.7);
        border-left-color: rgba(255, 255, 255, 0.7);
      }

      .b9 {
        border-style: inset;

        border-block-start-color: rgba(255, 255, 255, 0.4);
        border-right-color: rgba(255, 255, 255, 0.9);
        border-block-end-color: rgba(255, 255, 255, 0.5);
        border-left-color: rgba(255, 255, 255, 0.9);
      }

      .b10 {
        border-style: outset;

        border-block-start-color: rgba(255, 255, 255, 0.4);
        border-right-color: rgba(255, 255, 255, 0.9);
        border-block-end-color: rgba(255, 255, 255, 0.5);
        border-left-color: rgba(255, 255, 255, 0.9);
      }
    </style>
  </head>
  <body>
    <!-- https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Properties/border-style#Values -->
    <pre class="b3">dotted b3</pre>
    <pre class="b4">dashed b4</pre>
    <pre class="b5">solid b5</pre>
    <pre class="b6">double b6</pre>
    <pre class="b7">groove b7</pre>
    <pre class="b8">ridge b8</pre>
    <pre class="b9">inset b9</pre>
    <pre class="b10">outset b10</pre>
  </body>
</html>
