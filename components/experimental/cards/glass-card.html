<!doctype html>
<html>
  <head>
    <style>
      :root {
        --bg: #0d111b;
      }
      body {
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: sans-serif;
      }

      .glow-card {
        position: relative;
        width: 400px;
        height: 250px;
        background-color: rgba(248, 2, 80, 0.074) !important;
        background: radial-gradient(
          900px circle at var(--x) var(--y),
          rgba(248, 2, 80, 0.239),
          transparent 40%
        );
        border-radius: 120px;
        border: 0.5px solid rgba(255, 0, 162, 0.9);
        backdrop-filter: blur(10px); /* This back-drop filter is cnahing the bg color from `rgb(13, 17, 27)` or  `#0d111b` to `rgb(16, 17, 27)` or `#10111b` */
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        color: rgba(255, 255, 255, 0.487);
        font-size: 1.5rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 4px;
      }

      /* The actual "Glow" */
      .glow-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          300px circle at var(--x) var(--y),
          rgba(248, 2, 80, 0.239),
          transparent 40%
        );
      }

      /* The actual "Glow" */
      .glow-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          100px circle at var(--x) var(--y),
          rgba(248, 195, 2, 0.122),
          transparent 40%
        );
      }

      .inset-text {
        background-color: #565656; /* A background color */
        color: transparent; /* Makes the text fill transparent */
        text-shadow:
          -3px -3px 0px rgba(248, 195, 2, 0.06),
          /* Simulates a highlight from one side */ 3px 3px 0px
            rgba(248, 2, 80, 0.118); /* Simulates a shadow from the other side */
        -webkit-background-clip: text; /* Clips the background to the shape of the text (for webkit browsers) */
        background-clip: text; /* Clips the background to the shape of the text */
      }

      .paragraph {
        font-size: 1rem;
      }
      .stretched {
        letter-spacing: 10px;
      }
    </style>
  </head>
  <body>
    <div class="glow-card" id="card">
      <span class="inset-text">Creativity Unbanned </span>
    </div>
    <br />
    <div class="glow-card paragraph" id="">
      <p class="inset-text">
        Wake me up inside. <br />
        Wake me up inside. <br />
        Before I come undone.<br />
        Save me from the nothing I've become. <br />
        <span class="stretched">Bring me to Life!</span>
      </p>
    </div>

    <script>
      const card = document.getElementById("card");
      card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        // Calculate mouse position relative to the card
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        card.style.setProperty("--x", `${x}px`);
        card.style.setProperty("--y", `${y}px`);
      });
    </script>
  </body>
</html>
