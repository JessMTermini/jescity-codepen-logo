<!doctype html>
<html lang="en">
  <head>
    <style>
      body {
        padding: 50px;
        text-align: center;
      }

      img {
        width: 100px;

        /* #2 - 2nd Inner - RED */
        border: 5px solid hsl(0, 0%, 35%);

        /* #1 - inner-Most Green*/
        padding: 4px;
        background: hsl(0, 0%, 25%);

        /* #3 Bright Green*/
        outline: 5px solid hsl(0, 0%, 45%);

        /* #4 AND INFINITY!!! (CSS3 only) */
        box-shadow:
      /* #4 Bright Red*/
          0 0 0 11px hsl(0, 0%, 55%),
          /* #5 Bright Green */ 0 0 0 19px hsl(0, 0%, 65%);
      }

      #round {
        width: 500px;
        height: 200px;
        border-radius: 50px;
        margin-top: 100px;

        /* #2 - 2nd Inner - RED */
        border: 5px solid hsl(0, 0%, 35%);

        /* #1 - inner-Most Green*/
        padding: 4px;
        background: hsl(0, 0%, 10%);

        /* #3 Bright Green*/
        outline: 5px solid hsl(0, 0%, 45%);

        /* #4 AND INFINITY!!! (CSS3 only) */
        box-shadow:
      /* #4 Bright Red*/
          0 0 0 11px hsl(0, 0%, 55%),
          /* #5 Bright Green */ 0 0 0 19px hsl(0, 0%, 65%);
      }

      #rect {
        width: 500px;
        height: 200px;
        margin-top: 150px;

        /* #2 - 2nd Inner - RED */
        border: 5px solid hsl(0, 0%, 35%);

        /* #1 - inner-Most Green*/
        padding: 4px;
        background: hsl(0, 0%, 10%);

        /* #3 Bright Green*/
        outline: 5px solid hsl(0, 0%, 45%);

        /* #4 AND INFINITY!!! (CSS3 only) */
        box-shadow:
      /* #4 Bright Red*/
          0 0 0 11px hsl(0, 0%, 55%),
          /* #5 Bright Green */ 0 0 0 19px hsl(0, 0%, 65%);
      }

      /* If you could do pseudo elements 
     you could get a few more... */

      /* Also, HSL is awesome but don't use it if
     you need super old browser support */
    </style>
  </head>
  <body>
    <img
      src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/t-1/apr15-sphere.jpg"
      alt=""
    />
    <div id="round"></div>
    <div id="rect"></div>
  </body>
</html>
