<!DOCTYPE html>
<html>
<head>
<style>
  :root { --bg: #0d111b; --card-bg: rgba(248, 2, 80, 0.074); }
  body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }

  .glow-card {
    position: relative;
    width: 400px;
    height: 250px;
    background: radial-gradient(
      900px circle at var(--x) var(--y), 
      rgba(248, 2, 80, 0.239),
      transparent 40%
    );
    border-radius: 120px;
    border: .5px solid rgba(255, 0, 162, 0.9);
    backdrop-filter: blur(10px);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: rgba(255, 255, 255, 0.487);
    font-size: 1.5rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  /* The actual "Glow" */
  .glow-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
      300px circle at var(--x) var(--y), 
      rgba(248, 2, 80, 0.239),
      transparent 40%
    );
  }

  /* The actual "Glow" */
  .glow-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
      100px circle at var(--x) var(--y), 
      rgba(248, 195, 2, 0.122),
      transparent 40%
    );
  }
</style>
</head>
<body>

  <div class="glow-card" id="card">
    Creativity Unbanned 
  </div>

  <script>
    const card = document.getElementById('card');
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      // Calculate mouse position relative to the card
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      card.style.setProperty('--x', `${x}px`);
      card.style.setProperty('--y', `${y}px`);
    });
  </script>

</body>
</html>
